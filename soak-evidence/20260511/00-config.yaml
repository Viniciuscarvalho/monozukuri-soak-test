# Monozukuri — Autonomous Feature Delivery Configuration
#
# This file contains provider parameters but NOT API keys.
# Keys are loaded from .env at runtime.

# Which coding agent to invoke (claude-code | codex | gemini | kiro)
# legacy: skill.command: feature-marker still works via back-compat shim
agent: claude-code

source:
  # Active adapter to run before starting the loop.
  # One of: markdown | github | linear
  adapter: markdown

  # File to write adapter output. The orchestrator reads this.
  output: orchestration-backlog.json

  # Provider-specific parameters.
  # Only the active adapter's section is used.
  # All others are ignored at runtime.

  markdown:
    file: features.md # Relative to project root
    # That's all — no auth needed

  github:
    label: feature-marker # Filter issues by label (optional)
    state: open # open | closed | all
    # Auth: uses gh CLI auth, no env vars needed
    # Run: gh auth login

  linear:
    team: ENG # Filter issues by team
    # Auth: LINEAR_API_KEY from .env

  jira:
    project: PRJ # Jira project key
    jql: status = "To Do" # JQL filter (optional)
    # Auth: JIRA_URL, JIRA_EMAIL, JIRA_TOKEN from .env

  notion:
    database_id: abc123 # Notion database ID
    filter_property: Status
    filter_value: To Do
    # Auth: NOTION_TOKEN from .env

autonomy: full_auto

# Model selection — which Claude model to use.
# Supported: opus | sonnet | haiku | opusplan | full model IDs (claude-opus-4-7)
# "opusplan" uses Opus for planning, Sonnet for execution automatically.
# Override via CLI: --model opus | Override via env: ANTHROPIC_MODEL=opus
model:
  default: opusplan
  # plan: opus                 # PRD, TechSpec, Tasks generation
  # execute: sonnet            # Implementation, testing, review
  cost_baselines:
    phase_1_planning: 25000
    phase_2_per_task_specialist: 8000
    phase_2_per_task_generic: 12000
    phase_4_commit_pr: 5000
    fix_attempt_overhead: 3000

# Future — not implemented in this plan (ADR-003)
preprocessing:
  enabled: false
  model: null
  limits: {}

execution:
  max_concurrent: 1 # parallel worktrees (v1)
  skip_done: true
  skip_blocked: true
  base_branch: main

worktrees:
  base_path: .worktrees
  branch_prefix: feat
  auto_cleanup: true

# Memory (per ADR-002)
memory:
  carry_forward_from: global-context.md
  error_pattern_window: 5
  env_refresh: true

safety:
  breaking_change_pause: true
  schema_migration_review: true
  max_file_changes: 50
  feature_size:
    max_acceptance_criteria: 15
    max_tasks: 20
    max_file_changes_estimate: 80

pr_creation:
  strategy: draft # draft | ready | none
  auto_assign: true

notifications:
  on_complete: true
  on_failure: true

metrics:
  enabled: true
  collect_timing: true

# Agent Discovery and Task Routing (ADR-006)
discovery:
  enabled: true # Run agent discovery before each orchestration
  scan_only_threshold: 0 # Min agents required to run split mode (0 = always if any)

routing:
  prefer_agents: true # Prefer discovered agents over feature-marker
  fallback: feature-marker # "fallback" tagged tasks to feature-marker regardless of agents
  force_review: false # Force all "review" tagged tasks to a specific agent

# Layered learning (ADR-008 PR-C)
learning:
  ttl_days: 90
  similarity:
    backend: embedding # exact | embedding (embedding requires local_model.enabled: true)
    threshold: 0.85

# Convention file generation (PR3–PR4)
conventions:
  auto_sync: false # true = rewrite AGENTS.md from learning store after each successful run

execution_timeouts:
  skill_timeout_seconds: 1800 # Wall-clock limit for claude --skill invocations (op_timeout)

# Local-model integration (ADR-009)
local_model:
  enabled: true # opt-in; false = pure-Claude behaviour (zero change for existing users)
  provider: ollama # ollama | lm-studio | llama-cpp
  endpoint: http://localhost:11434
  embedding_model: nomic-embed-text
  classifier_model: llama3.2:3b
  summarizer_model: llama3.2:3b
  generator_model: null # set to a coder model (e.g. qwen2.5-coder:32b) to enable D8 (experimental)
  timeout_seconds: 10
  fail_open: false # true = degrade to Claude/exact-match on endpoint error
  engine_per_phase:
    phase_0: script # always script — no model needed
    phase_1: claude # planning requires Opus-grade reasoning
    phase_2: claude # set to local to enable generator replacement (D8)
    phase_3: script # test runner; local on fix-attempt is future work
    phase_4: claude # commit + PR template generation
